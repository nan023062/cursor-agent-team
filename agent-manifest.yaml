# Agent Manifest - IDE Agnostic Configuration
# This file describes all agents in a portable format.
# IDE-specific adapters read this file and generate their native configurations.
#
# Design Principles:
# - Pure YAML, no IDE-specific syntax
# - Glob patterns use standard wildcards (supported by most IDEs)
# - Trigger patterns use regex (adapters convert to native format)

version: "1.0"

# Global settings applied to all agents
global:
  # Default DNA template location (relative to agent directory)
  dna_template: templates/dna/
  # File encoding for all generated files
  encoding: utf-8-bom

# Agent definitions
agents:
  # ============================================================
  # Coder - Programming Agent
  # ============================================================
  coder:
    definition: coder/AGENT.md
    description: "Programming agent for code implementation, architecture management, and bug fixing within assembly boundaries."
    
    triggers:
      - pattern: "init|dev|fixbug|evolution"
        scope: explicit    # explicit = requires @agent call, auto = triggered automatically
        description: "Core development commands"
    
    managed_paths:
      - "Assets/**"
      - "XDTMonoProjects/**"
    
    protocols:
      - coder/protocols/code-review.md
      - coder/protocols/cross-assembly.md
      - coder/protocols/legacy-deployment.md
      - coder/protocols/performance-optimization.md
      - coder/protocols/strangler-migration.md
      - coder/protocols/task-decomposition.md
    
    templates:
      dna: coder/templates/dna/
      other:
        - coder/templates/readme.md
        - coder/templates/readme-en.md
        - coder/templates/health-audit.md
    
    # Cross-agent collaboration paths
    collaboration:
      consumes:
        - source: designer
          artifacts: ["feature-spec.md", "config/schema.md"]
        - source: tester
          artifacts: ["bug-report.md"]
        - source: artist
          artifacts: ["asset-pipeline.md", "asset-standards.md"]
      produces:
        - target: tester
          artifacts: ["architecture.md#public-api", "pitfalls.md"]
        - target: designer
          artifacts: ["architecture.md#performance-constraints"]

  # ============================================================
  # Designer - Game Design Agent
  # ============================================================
  designer:
    definition: designer/AGENT.md
    description: "Game design agent for system architecture, feature specs, and balance tuning."
    
    triggers:
      - pattern: "init|arch|concept|spec|balance|evolution"
        scope: explicit
        description: "Design workflow commands"
    
    managed_paths:
      - "Design/**"
      - "**/feature-spec.md"
      - "**/config/schema.md"
    
    protocols:
      - designer/protocols/balance.md
      - designer/protocols/config-arch.md
      - designer/protocols/ux-arch.md
    
    templates:
      dna: designer/templates/dna/
      other:
        - designer/templates/feature-spec.md

  # ============================================================
  # Tester - QA Agent
  # ============================================================
  tester:
    definition: tester/AGENT.md
    description: "QA agent for testing, bug reporting, and quality gates."
    
    triggers:
      - pattern: "init|test|bug|perf|gate|evolution"
        scope: explicit
        description: "Testing workflow commands"
    
    managed_paths:
      - "Tests/**"
      - "**/bug-report.md"
    
    templates:
      dna: meta-agent/templates/dna/
      other:
        - tester/templates/bug-report.md

  # ============================================================
  # Artist - Art Production Agent
  # ============================================================
  artist:
    definition: artist/AGENT.md
    description: "Art production agent for asset standards, pipeline, and naming conventions."
    
    triggers:
      - pattern: "init|ta|concept|check|naming|evolution"
        scope: explicit
        description: "Art workflow commands"
    
    managed_paths:
      - "Art/**"
      - "Assets/Art/**"
      - "**/asset-pipeline.md"
      - "**/asset-standards.md"
    
    templates:
      dna: meta-agent/templates/dna/

  # ============================================================
  # Creative - Vision & Research Agent
  # ============================================================
  creative:
    definition: creative/AGENT.md
    description: "Creative vision agent for research, milestones, and project direction."
    
    triggers:
      - pattern: "init|vision|blueprint|research|evolution"
        scope: explicit
        description: "Creative workflow commands"
    
    managed_paths:
      - "Creative/**"
      - "**/vision.md"
      - "**/blueprint.md"
    
    templates:
      dna: meta-agent/templates/dna/

  # ============================================================
  # Meta-Agent - Agent Factory & Auditor
  # ============================================================
  meta-agent:
    definition: meta-agent/AGENT.md
    description: "Meta-agent for creating new agents, syncing configurations, and auditing the agent ecosystem."
    
    triggers:
      - pattern: "new|sync|evolution"
        scope: explicit
        description: "Meta operations"
    
    managed_paths:
      - "gamedev/**"
    
    protocols:
      - meta-agent/protocols/evolution.md
      - meta-agent/protocols/sync.md
    
    templates:
      dna: meta-agent/templates/dna/
      other:
        - meta-agent/templates/agent-skeleton.md
        - meta-agent/templates/command.md

# IDE adapter hints (informational, adapters may extend)
adapter_hints:
  cursor:
    rules_dir: ".cursor/rules"
    commands_dir: ".cursor/commands"
    skills_dir: ".cursor/skills"
    rule_extension: ".mdc"
  claude:
    config_file: "CLAUDE.md"
    rules_dir: ".claude/rules"
  # Future adapters can be added here
